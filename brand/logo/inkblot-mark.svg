<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <title>Inkline — italic serif "i" with apostrophe-drop tittle</title>
  <desc>
    A handcrafted italic lowercase "i" in a Garamond-inspired serif, with the tittle
    replaced by a stylised apostrophe-form ink-drop.  All shapes are paths so the mark
    renders identically on every system regardless of available web fonts.
  </desc>

  <g fill="#3D2BE8">

    <!-- ============================================================
         STEM of the italic "i"
         Italic angle ~9°.  Garamond-style modulation:
           - Vertical stroke is thicker at mid-height, thinner at serifs.
           - Top serif is a small cupped bracket; bottom serif is a
             horizontal foot with a gentle concave underside.
         Drawn as a single closed path, outer contour clockwise.
         Coordinate system: "i" body occupies roughly x=38..82, y=60..180.
         Top of stem: y≈60 (below the apostrophe-drop which sits y=14..50).
         Bottom of stem (baseline): y=180.
         ============================================================ -->
    <path d="
      M 70,60
      L 78,60
      L 78,64
      L 74,66
      L 72,72
      L 68,170
      L 72,174
      L 78,176
      L 78,180
      L 50,180
      L 50,176
      L 56,174
      L 60,170
      L 62,72
      L 60,66
      L 56,64
      L 56,60
      Z
    "/>

    <!-- ============================================================
         APOSTROPHE-DROP TITTLE
         Sits above the stem.  References an italic Garamond apostrophe:
           - tapered teardrop body curling slightly right-to-left
           - ball terminal at the foot
         The form is read as "an ink-drop that caught the character of
         the typeface".
         Occupies roughly x=56..82, y=14..52.
         ============================================================ -->
    <!-- teardrop body, curling (apostrophe silhouette) -->
    <path d="
      M 74,14
      C 82,18 84,28 80,38
      C 77,44 72,48 66,50
      C 64,46 64,40 66,34
      C 68,26 70,20 74,14
      Z
    "/>
    <!-- ball terminal at foot of the apostrophe-drop -->
    <circle cx="66" cy="50" r="4.5"/>

  </g>
</svg>
