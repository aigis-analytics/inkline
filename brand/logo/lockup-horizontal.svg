<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" fill="none" role="img" aria-label="Inkline logo">
  <title>Inkline</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300&amp;display=swap');
    </style>
    <linearGradient id="drop-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B4FFF"/>
      <stop offset="100%" stop-color="#3D2BE8"/>
    </linearGradient>
  </defs>

  <!-- Mark: ink drop i, scaled to 80px height, viewBox 100x128 → scale 80/128 = 0.625 -->
  <!-- Rendered width: 100 × 0.625 = 62.5px -->
  <g transform="translate(0, 0) scale(0.625)">
    <path d="M 28,28 A 22,22 0 1,1 72,28 Q 72,48 50,60 Q 28,48 28,28 Z"
          fill="url(#drop-h)"/>
    <rect x="44" y="70" width="12" height="52" rx="6" fill="#3D2BE8"/>
  </g>

  <!-- Wordmark: starts at x = 62.5 + 24 = 86.5, baseline at y=62 -->
  <text
    x="87"
    y="62"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="56"
    font-weight="200"
    letter-spacing="-1"
    dominant-baseline="auto">
    <tspan fill="#0A0A0A">ink</tspan><tspan fill="#3D2BE8">line</tspan>
  </text>
</svg>
