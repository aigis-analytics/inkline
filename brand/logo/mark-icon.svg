<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5FFF"/>
      <stop offset="100%" stop-color="#3D2BE8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- White ink drop mark, centred — scale the 200×256 mark to fit in ~300×384, centred in 512×512 -->
  <!-- Transform: scale(300/200)=1.5, then translate to centre: x=(512-300)/2=106, y=(512-384)/2=64 -->
  <g transform="translate(106,64) scale(1.5)">
    <!-- Ink drop (white) -->
    <path d="M 56,56 A 44,44 0 1,1 144,56 Q 144,96 100,120 Q 56,96 56,56 Z" fill="white" opacity="0.95"/>
    <!-- Stem (white) -->
    <rect x="88" y="140" width="24" height="104" rx="12" fill="white" opacity="0.95"/>
  </g>
</svg>
