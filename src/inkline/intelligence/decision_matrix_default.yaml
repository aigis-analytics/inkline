##############################################################################
# Inkline Decision Matrix — Default Rules
#
# Derived from:
#   - Reference deck A — institutional bank pitchbook        [PT-*]
#   - Reference deck B — corporate brochure & fact sheet     [LP-*]
#   - Investment bank standard chart grammar                 [GS-*]
#
# Schema per rule:
#   id             : unique rule ID
#   data_structure : what shape is the raw data (Axis 1)
#   message_type   : what the slide must prove (Axis 2)
#   density        : "full_width" | "panel" | "any"
#   chart_type     : the exhibit type to use
#   enforce        : mandatory parameters injected into chart_data
#   confidence     : 0.0–1.0, starts at source-count-weighted value
#   observations   : updated by feedback aggregator
#   source         : originating reference deck(s)
#   status         : "active" | "candidate" | "low_confidence" | "flagged"
##############################################################################

version: 1
last_updated: "2026-04-14"
source_decks:
  - reference_deck_1
  - reference_deck_2

rules:

  # ─── SINGLE NUMBERS ───────────────────────────────────────────────────────

  - id: DM-001
    data_structure: single_number
    message_type: status_at_a_glance
    density: any
    chart_type: kpi_strip
    enforce:
      style: clean
    confidence: 0.95
    observations: 0
    source: [institutional-standard, reference_deck_2]
    status: active

  - id: DM-002
    data_structure: single_number
    message_type: progress_toward_target
    density: any
    chart_type: gauge
    enforce: {}
    confidence: 0.82
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── TWO-VALUE COMPARISONS ────────────────────────────────────────────────

  - id: DM-003
    data_structure: two_values_comparison
    message_type: change_over_time
    density: any
    chart_type: dumbbell
    enforce:
      accent_direction: auto   # post-processor infers from value direction
    confidence: 0.88
    observations: 0
    source: [reference_deck_1]   # PT-15
    status: active

  - id: DM-004
    data_structure: two_values_comparison
    message_type: ranking_or_comparison
    density: any
    chart_type: dumbbell
    enforce:
      accent_direction: higher_is_better
    confidence: 0.84
    observations: 0
    source: [reference_deck_1]
    status: active

  # ─── N CATEGORIES × ONE VALUE (BARS) ──────────────────────────────────────

  - id: DM-005
    data_structure: n_categories_one_value
    message_type: ranking_or_comparison
    density: full_width
    chart_type: grouped_bar
    enforce:
      style: clean
      accent_index: auto       # post-processor: highest value bar
      orientation: vertical_if_le_8_else_horizontal
    confidence: 0.93
    observations: 0
    source: [reference_deck_1, institutional-standard]   # PT-3
    status: active

  - id: DM-006
    data_structure: n_categories_one_value
    message_type: ranking_or_comparison
    density: panel
    chart_type: grouped_bar
    enforce:
      style: clean
      accent_index: auto
      label_density: compact
    confidence: 0.91
    observations: 0
    source: [reference_deck_1]
    status: active

  - id: DM-007
    data_structure: n_categories_one_value
    message_type: change_over_time
    density: any
    chart_type: grouped_bar
    enforce:
      style: clean
      accent_index: -1         # last (most recent) bar highlighted
    confidence: 0.87
    observations: 0
    source: [reference_deck_1, institutional-standard]
    status: active

  - id: DM-008
    data_structure: n_categories_one_value
    message_type: above_below_zero
    density: any
    chart_type: divergent_bar
    enforce: {}
    confidence: 0.90
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── N CATEGORIES × TIME SERIES (TRENDS) ─────────────────────────────────

  - id: DM-009
    data_structure: n_categories_time_series
    message_type: change_over_time
    density: any
    chart_type: line_chart
    enforce:
      spine_style: minimal
      grid: false
      annotate_endpoints: true
    confidence: 0.92
    observations: 0
    source: [institutional-standard]
    status: active

  - id: DM-010
    data_structure: n_categories_time_series
    message_type: ranking_or_comparison
    density: any
    chart_type: grouped_bar
    enforce:
      style: clean
      accent_series: 0         # first series (usually "our" metric) highlighted
    confidence: 0.85
    observations: 0
    source: [reference_deck_1]
    status: active

  # ─── COMPOSITION / SHARES ─────────────────────────────────────────────────

  - id: DM-011
    data_structure: n_categories_composition
    message_type: part_of_whole_breakdown
    density: any
    chart_type: stacked_bar
    enforce:
      style: clean
      accent_series: auto      # series with largest aggregate highlighted
    confidence: 0.88
    observations: 0
    source: [reference_deck_1, institutional-standard]
    status: active

  - id: DM-012
    data_structure: n_categories_composition
    message_type: part_of_whole_breakdown
    density: full_width
    chart_type: horizontal_stacked_bar
    enforce: {}
    notes: "prefer when categories have long labels and there are ≥4 periods"
    confidence: 0.82
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── PART-OF-WHOLE (DONUT / PIE) ──────────────────────────────────────────

  - id: DM-013
    data_structure: part_of_whole
    message_type: part_of_whole_breakdown
    density: full_width
    chart_type: donut
    enforce:
      label_style: direct      # radial labels, no legend panel (PT-14)
    confidence: 0.92
    observations: 0
    source: [reference_deck_1]   # PT-14
    status: active

  - id: DM-014
    data_structure: part_of_whole
    message_type: part_of_whole_breakdown
    density: panel
    chart_type: donut
    enforce:
      label_style: direct
    notes: "triptych pattern: three donuts in equal_3 multi_chart (PT-14)"
    confidence: 0.90
    observations: 0
    source: [reference_deck_1]
    status: active

  # ─── WATERFALL / BRIDGE ───────────────────────────────────────────────────

  - id: DM-015
    data_structure: n_categories_composition
    message_type: waterfall_bridge
    density: any
    chart_type: waterfall
    enforce: {}
    confidence: 0.90
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── SCATTER ──────────────────────────────────────────────────────────────

  - id: DM-016
    data_structure: two_continuous_variables
    message_type: concentration_or_outlier
    density: any
    chart_type: scatter
    enforce:
      label_style: annotated   # callout boxes with arrows (PT-4)
    confidence: 0.88
    observations: 0
    source: [reference_deck_1]   # PT-4
    status: active

  - id: DM-017
    data_structure: two_continuous_variables
    message_type: correlation
    density: any
    chart_type: scatter
    enforce:
      label_style: annotated
    confidence: 0.82
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── MATRIX / GRID ────────────────────────────────────────────────────────

  - id: DM-018
    data_structure: matrix_rows_cols
    message_type: capability_comparison
    density: any
    chart_type: scoring_matrix
    enforce: {}
    notes: "filled circles + cell backgrounds (PT-9)"
    confidence: 0.87
    observations: 0
    source: [reference_deck_1]   # PT-9
    status: active

  - id: DM-019
    data_structure: matrix_rows_cols
    message_type: density_or_intensity
    density: any
    chart_type: heatmap
    enforce: {}
    confidence: 0.84
    observations: 0
    source: [institutional-standard]
    status: active

  - id: DM-020
    data_structure: matrix_rows_cols
    message_type: state_migration
    density: any
    chart_type: transition_grid
    enforce: {}
    notes: "year x % grid showing transition path (PT-8)"
    confidence: 0.85
    observations: 0
    source: [reference_deck_1]   # PT-8
    status: active

  # ─── PROCESS / TIMELINE ───────────────────────────────────────────────────

  - id: DM-021
    data_structure: steps_over_time
    message_type: process_or_sequence
    density: any
    chart_type: multi_timeline
    enforce: {}
    notes: "3-band: duration / phase name / task bullets (PT-12)"
    confidence: 0.88
    observations: 0
    source: [reference_deck_1]   # PT-12
    status: active

  - id: DM-022
    data_structure: steps_over_time
    message_type: parallel_workstreams
    density: any
    chart_type: gantt
    enforce: {}
    notes: "parallel horizontal tracks, no gridlines (LP-7)"
    confidence: 0.87
    observations: 0
    source: [reference_deck_2]   # LP-7
    status: active

  - id: DM-023
    data_structure: steps_over_time
    message_type: process_or_sequence
    density: any
    chart_type: ladder
    enforce: {}
    notes: "ascending staircase steps; use when sequence is the message"
    confidence: 0.82
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── NETWORK / HIERARCHY ──────────────────────────────────────────────────

  - id: DM-024
    data_structure: network_relationships
    message_type: hierarchical_structure
    density: any
    chart_type: entity_flow
    enforce: {}
    notes: "must provide explicit x,y coords; auto-layout from level field"
    confidence: 0.85
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── TEXT-HEAVY STRUCTURED ────────────────────────────────────────────────

  - id: DM-025
    data_structure: text_heavy_structured
    message_type: feature_enumeration
    density: any
    chart_type: icon_stat
    enforce: {}
    notes: "prefer icon_stat (3-4 metrics) over kpi_strip when icons add meaning"
    confidence: 0.90
    observations: 0
    source: [institutional-standard]
    status: active

  - id: DM-026
    data_structure: text_heavy_structured
    message_type: ranking_or_comparison
    density: any
    chart_type: scoring_matrix
    enforce: {}
    notes: "structured A vs B vs C comparison across 4-8 criteria"
    confidence: 0.84
    observations: 0
    source: [reference_deck_1]
    status: active

  # ─── RADAR ────────────────────────────────────────────────────────────────

  - id: DM-027
    data_structure: n_categories_one_value
    message_type: multi_dimension_profile
    density: any
    chart_type: radar
    enforce: {}
    notes: "only when 5-8 axes and the 'shape' is the message"
    confidence: 0.76
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── RANKING OVER TIME ────────────────────────────────────────────────────

  - id: DM-028
    data_structure: n_categories_time_series
    message_type: ranking_or_comparison
    density: any
    chart_type: bump_chart
    enforce: {}
    notes: "use when the story is rank changes over time, not absolute values"
    confidence: 0.80
    observations: 0
    source: [institutional-standard]
    status: active

  # ─── DISCRETE PERIOD MEASUREMENTS ────────────────────────────────────────

  - id: DM-029
    data_structure: n_categories_time_series
    message_type: change_over_time
    density: any
    chart_type: staircase
    enforce: {}
    notes: "use for headcount, regulatory thresholds, capacity — step-line format"
    confidence: 0.78
    observations: 0
    source: [institutional-standard]
    status: active

##############################################################################
# SLIDE TYPE CAPACITY LIMITS
##############################################################################

capacity_limits:
  icon_stat: {min: 2, max: 4}
  kpi_strip: {min: 3, max: 5}
  three_card: {exact: 3}
  four_card: {exact: 4}
  feature_grid: {exact: 6}
  process_flow: {max: 4}
  timeline: {max: 6}
  progress_bars: {max: 6}
  table: {max_rows: 6, max_cols: 6}
  split: {max_per_side: 6}
  credentials: {min: 4, max: 8}
  testimonial: {max_quote_chars: 200, max_attribution_chars: 60}
  before_after: {min_per_side: 3, max_per_side: 5}
  team_grid: {min: 2, max: 4}
  content: {max_bullets: 6}
  comparison: {max_rows: 6}
  pyramid: {min: 3, max: 5}
  bar_chart: {max_bars: 12}

##############################################################################
# DECISION SEQUENCE (for slide type selection)
##############################################################################

slide_type_decision_sequence:
  step1_content_type:
    data_quantitative:
      primary: [icon_stat, stat, kpi_strip, chart_caption, dashboard]
      note: "If single dominant metric: icon_stat first. If time-series: chart_caption."
    data_comparison:
      primary: [comparison, split, four_card, three_card]
      note: "Head-to-head of 2 options: comparison. Multiple variables: multi_chart."
    process_sequential:
      primary: [process_flow, timeline]
      note: "Steps with order: process_flow (≤4 steps). Events with dates: timeline (≤6)."
    conceptual_categories:
      primary: [three_card, four_card, feature_grid, pyramid]
      note: "Exactly 3: three_card. Exactly 4: four_card. Exactly 6: feature_grid."
    narrative_text:
      primary: [three_card, split, content]
      note: "content (bullet list) is LAST RESORT only."
    team_and_people:
      primary: [team_grid]
      note: "Management team, advisory board, key personnel. 2-4 members."

  step2_dominant_metric:
    single_hero_number:
      primary: [icon_stat, stat]
      note: "If metric has an icon: icon_stat. Pure number: stat."
    multiple_kpis:
      primary: [kpi_strip, icon_stat]
      note: "3-5 KPIs: kpi_strip. With icons: icon_stat."

  step3_item_count:
    exactly_3: [three_card, process_flow, icon_stat, stat]
    exactly_4: [four_card, process_flow, "multi_chart equal_4"]
    exactly_6: [feature_grid, split, table]
    range_4_to_8: [credentials, timeline, progress_bars]

##############################################################################
# DATA STRUCTURE VOCABULARY (Axis 1)
# single_number | two_values_comparison | n_categories_one_value |
# n_categories_time_series | n_categories_composition | part_of_whole |
# two_continuous_variables | matrix_rows_cols | steps_over_time |
# state_transition | network_relationships | text_heavy_structured
#
# MESSAGE TYPE VOCABULARY (Axis 2)
# status_at_a_glance | ranking_or_comparison | change_over_time |
# part_of_whole_breakdown | process_or_sequence | parallel_workstreams |
# capability_comparison | concentration_or_outlier | state_migration |
# waterfall_bridge | above_below_zero | progress_toward_target |
# correlation | density_or_intensity | feature_enumeration |
# hierarchical_structure | multi_dimension_profile | narrative_with_data
##############################################################################
