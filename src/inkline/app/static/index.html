<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c63ff;
    --accent-hover: #7c73ff;
    --text: #e8eaf0;
    --muted: #8890a4;
    --success: #4ade80;
    --warn: #f59e0b;
    --error: #f87171;
    --radius: 8px;
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  #app { display: grid; grid-template-columns: 380px 240px 1fr; height: 100vh; gap: 0; }

  /* ── Left panel ── */
  #left { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--surface); }

  #header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
  #header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  #header p { color: var(--muted); font-size: 12px; margin-top: 3px; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 100%; padding: 10px 14px; border-radius: var(--radius); line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.assistant { background: var(--bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.system { background: transparent; color: var(--muted); font-size: 12px; text-align: center; border: none; padding: 4px; }
  .msg.thinking { color: var(--muted); font-style: italic; }

  #drop-zone { margin: 0 16px 8px; border: 2px dashed var(--border); border-radius: var(--radius); padding: 12px; text-align: center; color: var(--muted); font-size: 12px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  #drop-zone:hover, #drop-zone.over { border-color: var(--accent); color: var(--accent); }
  #drop-zone input { display: none; }

  #file-badge { margin: 0 16px 8px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); display: none; align-items: center; gap: 8px; font-size: 12px; }
  #file-badge span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--success); }
  #file-badge button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
  #file-badge button:hover { color: var(--error); }

  #input-row { padding: 12px 16px 16px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  #prompt { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 9px 12px; font-size: 13px; resize: none; height: 72px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  #prompt:focus { border-color: var(--accent); }
  #prompt::placeholder { color: var(--muted); }
  #send { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; padding: 0 18px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.15s; white-space: nowrap; }
  #send:hover:not(:disabled) { background: var(--accent-hover); }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Middle panel — Pipeline progress ── */
  #middle {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
  }

  #prog-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }

  #prog-overall {
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #prog-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  #prog-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  #prog-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }

  #prog-pct { color: var(--accent); font-weight: 600; }
  #prog-elapsed { color: var(--muted); }

  #prog-phases { padding: 8px 0; }

  .phase-row {
    display: flex;
    align-items: flex-start;
    padding: 5px 16px;
    gap: 9px;
  }

  .phase-circle {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.3s, border-color 0.3s;
  }

  .phase-circle.running {
    border-color: transparent;
    background: conic-gradient(var(--accent) 0deg 270deg, transparent 270deg 360deg);
    animation: spin-arc 1s linear infinite;
  }

  .phase-circle.complete {
    background: var(--success);
    border-color: var(--success);
  }

  .phase-circle.error {
    background: var(--error);
    border-color: var(--error);
  }

  @keyframes spin-arc {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .phase-info { flex: 1; min-width: 0; }

  .phase-label {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .phase-label.muted { color: var(--muted); font-weight: 400; }

  .phase-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .phase-sub {
    padding: 4px 16px 6px 39px;
  }

  .sub-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .sub-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .sub-count {
    font-size: 10px;
    color: var(--muted);
  }

  .vision-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 5px 16px 6px 39px;
  }

  .vdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.25s;
    flex-shrink: 0;
  }

  .vdot.done { background: var(--success); }
  .vdot.warn { background: var(--warn); }
  .vdot.error { background: var(--error); }

  #prog-idle {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px 16px;
    color: var(--muted);
    text-align: center;
  }

  #prog-idle svg { opacity: 0.25; }
  #prog-idle p { font-size: 11px; line-height: 1.6; }

  /* ── Right panel — PDF preview ── */
  #right { display: flex; flex-direction: column; background: var(--bg); }

  #preview-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  #preview-header span { font-weight: 600; font-size: 14px; }
  #preview-status { color: var(--muted); font-size: 12px; }
  #download-btn { margin-left: auto; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: var(--radius); font-size: 12px; cursor: pointer; text-decoration: none; display: none; transition: border-color 0.15s; }
  #download-btn:hover { border-color: var(--accent); color: var(--accent); }

  #pdf-frame { flex: 1; border: none; background: #525659; }

  #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
  #empty-state svg { opacity: 0.3; }
  #empty-state p { font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- Left: Chat + file upload -->
  <div id="left">
    <div id="header">
      <h1>Inkline</h1>
      <p>Branded slides &amp; documents — powered by Claude</p>
    </div>

    <div id="messages">
      <div class="msg system">Upload a file or describe what you want to create.</div>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".md,.txt,.docx,.pdf,.pptx">
      Drop a file here, or click to browse (.md .docx .pdf .pptx)
    </div>

    <div id="file-badge">
      <span id="file-name"></span>
      <button id="clear-file" title="Remove file">×</button>
    </div>

    <div id="input-row">
      <textarea id="prompt" placeholder="What would you like to create? e.g. 'Turn this into a 10-slide investor pitch'" rows="3"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <!-- Middle: Pipeline progress tracker -->
  <div id="middle">
    <div id="prog-header">Pipeline</div>
    <div id="prog-overall" style="display:none">
      <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
      <div id="prog-meta">
        <span id="prog-pct">0%</span>
        <span id="prog-elapsed"></span>
      </div>
    </div>
    <div id="prog-phases" style="display:none"></div>
    <div id="prog-idle">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
      <p>Progress will appear<br>when a run starts.</p>
    </div>
  </div>

  <!-- Right: PDF preview -->
  <div id="right">
    <div id="preview-header">
      <span>Preview</span>
      <span id="preview-status">No deck yet</span>
      <a id="download-btn" href="#" download="deck.pdf">Download PDF</a>
    </div>
    <div id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      <p>Your generated deck will appear here.</p>
    </div>
    <iframe id="pdf-frame" style="display:none"></iframe>
  </div>

</div>

<script>
const BRIDGE = '';
const LS = {
  MSGS:    'inkline_messages',
  PDF:     'inkline_last_pdf',
  FILE_PATH: 'inkline_file_path',
  FILE_NAME: 'inkline_file_name',
};

let pendingFilePath = null;
let lastPdfFilename = null;

// ── Persistence helpers ───────────────────────────────────────────────────────
function saveMsgs() {
  const nodes = document.querySelectorAll('#messages .msg');
  const items = [];
  nodes.forEach(n => {
    // Skip transient "Thinking…" bubbles
    if (n.classList.contains('thinking')) return;
    items.push({ role: [...n.classList].find(c => c !== 'msg'), text: n.textContent });
  });
  try { localStorage.setItem(LS.MSGS, JSON.stringify(items)); } catch(_) {}
}

function restoreSession() {
  // 1. Restore messages
  try {
    const raw = localStorage.getItem(LS.MSGS);
    if (raw) {
      const items = JSON.parse(raw);
      // Clear default "Upload a file…" hint if we have history
      if (items.length) document.getElementById('messages').innerHTML = '';
      items.forEach(({ role, text }) => _addMessageDOM(role, text));
    }
  } catch(_) {}

  // 2. Restore uploaded file badge
  const fp = localStorage.getItem(LS.FILE_PATH);
  const fn = localStorage.getItem(LS.FILE_NAME);
  if (fp && fn) {
    pendingFilePath = fp;
    document.getElementById('file-name').textContent = fn;
    document.getElementById('file-badge').style.display = 'flex';
    document.getElementById('drop-zone').style.display = 'none';
  }

  // 3. Restore PDF preview
  const lastPdf = localStorage.getItem(LS.PDF);
  if (lastPdf) showPdf(lastPdf, /* skipSave */ true);

  // 4. Reconnect progress if a run is still active on the server
  fetch('/status')
    .then(r => r.json())
    .then(state => {
      if (state.active || (state.phases && state.phases.length)) {
        document.getElementById('prog-idle').style.display = 'none';
        document.getElementById('prog-overall').style.display = '';
        document.getElementById('prog-phases').style.display = '';
        updateProgress(state);
        if (state.active) startProgressTracking();
      }
    })
    .catch(() => {});
}

// ── File upload ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileBadge = document.getElementById('file-badge');
const fileName  = document.getElementById('file-name');
const clearFile = document.getElementById('clear-file');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); });
clearFile.addEventListener('click', () => {
  pendingFilePath = null;
  fileBadge.style.display = 'none';
  dropZone.style.display = '';
  fileInput.value = '';
  localStorage.removeItem(LS.FILE_PATH);
  localStorage.removeItem(LS.FILE_NAME);
});

async function uploadFile(file) {
  addMessage('system', `Uploading ${file.name}…`);
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/upload', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.path) {
      pendingFilePath = d.path;
      fileName.textContent = file.name;
      fileBadge.style.display = 'flex';
      dropZone.style.display = 'none';
      try {
        localStorage.setItem(LS.FILE_PATH, d.path);
        localStorage.setItem(LS.FILE_NAME, file.name);
      } catch(_) {}
      addMessage('system', `File ready: ${file.name}`);
    } else {
      addMessage('system', `Upload failed: ${d.error}`);
    }
  } catch(e) {
    addMessage('system', `Upload error: ${e.message}`);
  }
}

// ── Chat ──────────────────────────────────────────────────────────────────────
const messages = document.getElementById('messages');
const promptEl = document.getElementById('prompt');
const sendBtn  = document.getElementById('send');

function _addMessageDOM(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addMessage(role, text) {
  const div = _addMessageDOM(role, text);
  saveMsgs();
  return div;
}

promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = promptEl.value.trim();
  if (!text) return;

  let prompt = text;
  if (pendingFilePath) {
    prompt = `I've uploaded a file at: ${pendingFilePath}\n\n${text}`;
    pendingFilePath = null;
    fileBadge.style.display = 'none';
    dropZone.style.display = '';
    fileInput.value = '';
    fileName.textContent = '';
    localStorage.removeItem(LS.FILE_PATH);
    localStorage.removeItem(LS.FILE_NAME);
  }

  addMessage('user', text);
  promptEl.value = '';
  sendBtn.disabled = true;

  const thinking = _addMessageDOM('assistant thinking', 'Thinking…');
  startProgressTracking();

  try {
    const r = await fetch('/prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, agentic: true }),
    });
    const d = await r.json();
    thinking.remove();

    if (d.response) {
      addMessage('assistant', d.response);
      checkForPdf(d.response);
    } else if (d.error) {
      addMessage('assistant', `Error: ${d.error}`);
    }
  } catch(e) {
    thinking.remove();
    addMessage('assistant', `Connection error: ${e.message}. Is the bridge running?`);
  } finally {
    sendBtn.disabled = false;
    promptEl.focus();
  }
}

// ── PDF detection & preview ───────────────────────────────────────────────────
const previewStatus = document.getElementById('preview-status');
const downloadBtn   = document.getElementById('download-btn');
const pdfFrame      = document.getElementById('pdf-frame');
const emptyState    = document.getElementById('empty-state');

function checkForPdf(responseText) {
  const match = responseText.match(/PDF ready:\s*([^\s\n]+\.pdf)/i);
  if (match) {
    const absPath = match[1];
    const parts = absPath.replace(/\\/g, '/').split('/');
    showPdf(parts[parts.length - 1]);
  }
}

function showPdf(filename, skipSave) {
  const url = `/output/${filename}?t=${Date.now()}`;
  lastPdfFilename = filename;
  pdfFrame.src = url;
  pdfFrame.style.display = 'block';
  emptyState.style.display = 'none';
  previewStatus.textContent = filename;
  downloadBtn.href = url;
  downloadBtn.download = filename;
  downloadBtn.style.display = 'inline-block';
  if (!skipSave) {
    try { localStorage.setItem(LS.PDF, filename); } catch(_) {}
  }
}

// ── Pipeline progress tracker ─────────────────────────────────────────────────
let progEs = null;
let progPollTimer = null;

function startProgressTracking() {
  stopProgressTracking();
  document.getElementById('prog-idle').style.display = 'none';
  document.getElementById('prog-overall').style.display = '';
  document.getElementById('prog-phases').style.display = '';

  progEs = new EventSource('/progress');
  progEs.onmessage = e => {
    try { updateProgress(JSON.parse(e.data)); } catch(_) {}
  };
  progEs.onerror = () => {
    if (progEs) { progEs.close(); progEs = null; }
    progPollTimer = setInterval(() => {
      fetch('/status')
        .then(r => r.json())
        .then(updateProgress)
        .catch(() => {});
    }, 3000);
  };
}

function stopProgressTracking() {
  if (progEs) { progEs.close(); progEs = null; }
  if (progPollTimer) { clearInterval(progPollTimer); progPollTimer = null; }
}

function fmtElapsed(s) {
  if (s == null || s === '') return '';
  s = Math.round(s);
  return s < 60 ? `${s}s` : `${Math.floor(s / 60)}m ${s % 60}s`;
}

function updateProgress(state) {
  if (!state || !Array.isArray(state.phases)) return;

  const pct = state.complete ? 100 : (state.pct || 0);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = state.complete ? '100%' : (pct > 0 ? pct + '%' : '—');
  document.getElementById('prog-elapsed').textContent = fmtElapsed(state.elapsed_s);

  const container = document.getElementById('prog-phases');
  container.innerHTML = '';

  state.phases.forEach(phase => {
    const row = document.createElement('div');
    row.className = 'phase-row';

    const circ = document.createElement('div');
    circ.className = 'phase-circle' + (phase.status !== 'pending' ? ' ' + phase.status : '');

    const info = document.createElement('div');
    info.className = 'phase-info';

    const label = document.createElement('div');
    label.className = 'phase-label' + (phase.status === 'pending' ? ' muted' : '');
    label.textContent = phase.label;
    info.appendChild(label);

    if (phase.elapsed_s != null) {
      const t = document.createElement('div');
      t.className = 'phase-time';
      t.textContent = fmtElapsed(phase.elapsed_s);
      info.appendChild(t);
    } else if (phase.status === 'running') {
      const t = document.createElement('div');
      t.className = 'phase-time';
      t.textContent = fmtElapsed(state.elapsed_s) || '…';
      info.appendChild(t);
    }

    row.appendChild(circ);
    row.appendChild(info);
    container.appendChild(row);

    if (phase.name === 'design_advisor_llm' && phase.status === 'running' &&
        state.slide_design_total > 0) {
      const sub = document.createElement('div');
      sub.className = 'phase-sub';
      const pct2 = Math.round(state.slide_design_done / state.slide_design_total * 100);
      const bw = document.createElement('div');
      bw.className = 'sub-bar-wrap';
      const b = document.createElement('div');
      b.className = 'sub-bar';
      b.style.width = pct2 + '%';
      bw.appendChild(b);
      const cnt = document.createElement('div');
      cnt.className = 'sub-count';
      cnt.textContent = `Slide ${state.slide_design_done} / ${state.slide_design_total}`;
      sub.appendChild(bw);
      sub.appendChild(cnt);
      container.appendChild(sub);
    }

    if (phase.name === 'export_pdf_with_audit' && state.vision_total > 0) {
      const dots = document.createElement('div');
      dots.className = 'vision-dots';
      for (let i = 0; i < state.vision_total; i++) {
        const dot = document.createElement('span');
        dot.className = 'vdot' + (i < state.vision_done ? ' done' : '');
        dots.appendChild(dot);
      }
      container.appendChild(dots);
    }
  });

  if (state.error) {
    const err = document.createElement('div');
    err.style.cssText = 'padding:8px 16px;font-size:11px;color:var(--error);word-break:break-word;';
    err.textContent = state.error;
    container.appendChild(err);
  }

  if (state.complete || state.error) stopProgressTracking();
}

// ── Keyboard shortcut ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendMessage();
});

// ── Boot: restore persisted session ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', restoreSession);
</script>
</body>
</html>
